name: CI

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'
      - 'build.ps1'
      - 'installer/**'
      - 'xmldiff/**'
      - 'xmldiff.Core/**'
      - 'xmldiff.UI/**'
      - 'xmlssort/**'
      - 'xmlssort.Core/**'
      - 'xmlssort.Tests/**'
      - 'xmlssort.sln'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'build.ps1'
      - 'installer/**'
      - 'xmldiff/**'
      - 'xmldiff.Core/**'
      - 'xmldiff.UI/**'
      - 'xmlssort/**'
      - 'xmlssort.Core/**'
      - 'xmlssort.Tests/**'
      - 'xmlssort.sln'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          cache: true

      - name: Restore solution
        shell: pwsh
        run: dotnet restore .\xmlssort.sln

      - name: Build solution
        shell: pwsh
        run: dotnet build .\xmlssort.sln -c Release --no-restore

      - name: Run tests
        shell: pwsh
        run: dotnet test .\xmlssort.Tests\xmlssort.Tests.csproj -c Release --no-build

  build-installer:
    name: Build installer (${{ matrix.platform }})
    runs-on: windows-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x64
          - x86

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          cache: true

      - name: Prepare code-signing certificate
        if: ${{ secrets.XMLSSORT_CERTIFICATE_PFX_BASE64 != '' }}
        shell: pwsh
        env:
          XMLSSORT_CERTIFICATE_PFX_BASE64: ${{ secrets.XMLSSORT_CERTIFICATE_PFX_BASE64 }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'xmlssort-codesign.pfx'
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:XMLSSORT_CERTIFICATE_PFX_BASE64))
          "XMLSSORT_CERTIFICATE_FILE_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        env:
          XMLSSORT_SIGN_ARTIFACTS: ${{ secrets.XMLSSORT_CERTIFICATE_THUMBPRINT != '' || secrets.XMLSSORT_CERTIFICATE_PFX_BASE64 != '' }}
          XMLSSORT_CERTIFICATE_THUMBPRINT: ${{ secrets.XMLSSORT_CERTIFICATE_THUMBPRINT }}
          XMLSSORT_CERTIFICATE_PASSWORD: ${{ secrets.XMLSSORT_CERTIFICATE_PASSWORD }}
          XMLSSORT_SIGNTOOL_PATH: ${{ vars.XMLSSORT_SIGNTOOL_PATH }}
          XMLSSORT_TIMESTAMP_URL: ${{ vars.XMLSSORT_TIMESTAMP_URL }}
        run: .\build.ps1 -Configuration Release -Platform ${{ matrix.platform }}

      - name: Package published tools
        shell: pwsh
        run: |
          $archivePath = "artifacts\installer\win-${{ matrix.platform }}\xmlssort-tools-${{ matrix.platform }}.zip"
          Compress-Archive -Path "artifacts\publish\win-${{ matrix.platform }}\*" -DestinationPath $archivePath -Force

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            artifacts\installer\win-${{ matrix.platform }}\*.msi
            artifacts\installer\win-${{ matrix.platform }}\*.zip
          if-no-files-found: error
