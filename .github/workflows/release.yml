name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            artifact: xmlssort
          - rid: win-x64
            os: windows-latest
            artifact: xmlssort.exe
          - rid: osx-x64
            os: macos-latest
            artifact: xmlssort
          - rid: osx-arm64
            os: macos-latest
            artifact: xmlssort

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run tests
        run: dotnet test xmlssort.Tests/xmlssort.Tests.csproj --configuration Release

      - name: Publish
        run: >
          dotnet publish xmlssort/xmlssort.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --output publish/${{ matrix.rid }}
          /p:VersionSuffix=${{ github.run_number }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmlssort-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/${{ matrix.artifact }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Read version prefix
        id: version
        run: |
          VERSION_PREFIX=$(grep -oP '(?<=<VersionPrefix>)[^<]+' xmlssort/xmlssort.csproj)
          echo "tag=v${VERSION_PREFIX}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/xmlssort-linux-x64/xmlssort   artifacts/xmlssort-linux-x64
          mv artifacts/xmlssort-win-x64/xmlssort.exe artifacts/xmlssort-win-x64.exe
          mv artifacts/xmlssort-osx-x64/xmlssort     artifacts/xmlssort-osx-x64
          mv artifacts/xmlssort-osx-arm64/xmlssort   artifacts/xmlssort-osx-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/xmlssort-linux-x64
            artifacts/xmlssort-win-x64.exe
            artifacts/xmlssort-osx-x64
            artifacts/xmlssort-osx-arm64
